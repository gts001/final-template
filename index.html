<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Watchlist Explorer</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header>
    <nav>
      <span class="nav__logo">Watchlist Explorer</span>
      <div class="nav__links">
        <a href="index.html">Search</a>
        <a href="saved.html">Saved</a>
      </div>
      <div class="nav__actions">
        <span id="nav-user"></span>
        <button id="logout-btn" type="button">Logout</button>
      </div>
    </nav>
  </header>

  <main>

    <section>
      <form id="search-form" class="search-form">
        <div class="search-form__group">
          <label for="search-input">Search Title:</label>
          <input type="text" id="search-input" required minlength="2" placeholder="e.g. Bloodhounds">
        </div>

        <div class="search-form__group">
          <label for="year-input">Year:</label>
          <input type="number" id="year-input" min="1900" max="2099" placeholder="e.g. 2023">
        </div>

        <div class="search-form__group">
          <label for="type-select">Type:</label>
          <select id="type-select">
            <option value="">Any</option>
            <option value="movie">Movie</option>
            <option value="series">Series</option>
          </select>
        </div>

        <button type="submit">Search</button>
      </form>
    </section>

    

    <p id="loading-msg" hidden>Loading…</p>
    <p id="error-msg" hidden></p>

    <section>
      <div id="results-grid"></div>
    </section>

  </main>

  <footer>
    <p>&copy; 2026 Watchlist Explorer</p>
  </footer>

  <script type="module" src="js/main.js"></script>
</body>
</html>
